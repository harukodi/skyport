services:
  xray-warp-ct-test-container:
    image: xia1997x/skyport:staging
    container_name: xray-warp-ct-test-container
    restart: unless-stopped
    pull_policy: always
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - DOMAIN_NAME=${DOMAIN_NAME}
      - XRAY_PATH=${XRAY_PATH}
      - XRAY_UUID=${XRAY_UUID}
      - CLOUDFLARE_AUTH_TOKEN=${CLOUDFLARE_AUTH_TOKEN}
      - XRAY_ENCRYPTION_KEY=${XRAY_ENCRYPTION_KEY}
      - XRAY_DECRYPTION_KEY=${XRAY_DECRYPTION_KEY}
      - SKYPORT_USERNAME=${SKYPORT_USERNAME}
      - SKYPORT_PASSWORD=${SKYPORT_PASSWORD}
      - XRAY_VERSION=${XRAY_VERSION}
      - ENABLE_CADDY_LOG=${ENABLE_CADDY_LOG}
      - ENABLE_WARP_ON_STARTUP=${ENABLE_WARP_ON_STARTUP}
      - FRONTEND_PATH=${FRONTEND_PATH}
      - PORT=8443
    ports:
      - "8443:443"
    volumes:
      - xray-warp-ct-staging-certs-volume:/xray_base/caddy_certs/caddy

volumes:
  xray-warp-ct-staging-certs-volume:
    external: true