name: skyport release CI

on:
  push:
    branches:
      - main
    paths:
      - "src/**"
  workflow_dispatch:

jobs:
  build-skyport-release:
    runs-on: ubuntu-latest
    steps:
      - name: Get the current date
        id: date
        run: |
          echo "CURRENT_DATE=$(date "+%Y-%m-%d")" >> $GITHUB_OUTPUT
      - name: Checkout
        uses: actions/checkout@v3
      # Docker buildx steps
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push skyport-headless backend image
        uses: docker/build-push-action@v6
        with:
          platforms: linux/amd64
          context: src/
          target: backend
          push: true
          tags: |
            ${{ vars.DOCKERHUB_USERNAME }}/skyport-headless:latest
            ${{ vars.DOCKERHUB_USERNAME }}/skyport-headless:${{ steps.date.outputs.CURRENT_DATE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push skyport backend + frontend image
        uses: docker/build-push-action@v6
        with:
          platforms: linux/amd64
          context: src/
          target: frontend
          push: true
          tags: |
            ${{ vars.DOCKERHUB_USERNAME }}/skyport:latest
            ${{ vars.DOCKERHUB_USERNAME }}/skyport:${{ steps.date.outputs.CURRENT_DATE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max